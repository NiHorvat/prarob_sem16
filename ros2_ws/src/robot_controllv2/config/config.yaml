ik_node:
  ros__parameters:
    xyz_subscriber_topic: /ik_node/xyz
    angles_publisher_topic: /move_servos_node/angles

    # link lengths (metres) — must match the URDF
    d1: 0.0609   # world to joint1 (base yaw)
    d2: 0.0209   # joint1 to joint2 (arm pitch)
    L1: 0.224    # joint2 to joint3 (arm length)
    L2: 0.125    # joint3 to pen tip (wrist bracket 0.020 + pen 0.105)

move_servos_node:
  ros__parameters:
    angles_subscriber_topics: /move_servos_node/angles
    commands_subscriber_topic: /move_servos_node/commands
